<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OS Lab Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Het Kapadiya</h1>
    <header>
        <h1>Memory & Virtual Memory Management Simulator</h1>
        <p>Backend: C Logic | Frontend: Vanilla JS</p>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 'allocation')">Memory Allocation</button>
        <button class="tab-btn" onclick="openTab(event, 'paging')">Page Replacement</button>
        <button class="tab-btn" onclick="openTab(event, 'frag')">Fragmentation Analyzer</button>
        <button class="tab-btn" onclick="openTab(event, 'comp')">Algorithm Comparison</button>
    </nav>

    <div class="container">
        <!-- ALLOCATION TAB -->
        <section id="allocation" class="tab-content active">
            <div class="control-panel">
                <div class="field">
                    <label>Memory Blocks (KB)</label>
                    <input type="text" id="blocks-in" placeholder="100 500 200 300">
                </div>
                <div class="field">
                    <label>Process Sizes (KB)</label>
                    <input type="text" id="procs-in" placeholder="212 417 112">
                </div>
                <div class="field">
                    <label>Algorithm</label>
                    <select id="algo-in">
                        <option value="first">First Fit</option>
                        <option value="best">Best Fit</option>
                        <option value="worst">Worst Fit</option>
                    </select>
                </div>
                <button class="run-btn" onclick="triggerSimulation()">Run Simulation</button>
            </div>

            <h3>RAM Visualization</h3>
            <div id="ram-grid" class="ram-grid">
                <div class="empty-msg">Enter data and click Run...</div>
            </div>
        </section>

        <!-- FRAGMENTATION TAB -->
        <section id="frag" class="tab-content">
            <h3>System Metrics</h3>
            <div id="frag-stats" class="stats-grid">
                <div class="stat-box">Internal Frag: <span id="stat-int">0</span> KB</div>
                <div class="stat-box">External Frag: <span id="stat-ext">0</span> KB</div>
            </div>
        </section>

        <!-- PAGINATION TAB -->
        <section id="paging" class="tab-content">
    <div class="control-panel">
        <div class="field">
            <label>Reference String</label>
            <input type="text" id="ref-string" placeholder="7 0 1 2 0 3 0 4">
        </div>

        <div class="field">
            <label>Frames</label>
            <input type="number" id="frame-count" value="3">
        </div>

        <div class="field">
            <label>Algorithm</label>
            <select id="page-algo">
                <option value="fifo">FIFO</option>
                <option value="lru">LRU</option>
                <option value="optimal">Optimal</option>
            </select>
        </div>

        <button class="run-btn" onclick="runPaging()">Run Paging</button>
    </div>

    <div id="paging-table-container"></div>
</section>

        <!-- COMPARISON TAB -->
        <section id="comp" class="tab-content">
        <h3>Algorithm Comparison</h3> 
        <button class = "run-btn" onclick="runComparison()">Compare Algorithms</button>

    <table class="comp-table">
        <thead>
            <tr><th>Algorithm</th><th>Total Fragmentation</th></tr>
        </thead>
        <tbody id="comp-body"></tbody>
    </table>
</section>

    <script src="script.js"></script>
</body>
</html>
